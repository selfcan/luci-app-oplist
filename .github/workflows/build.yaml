name : I only smoke when i drink

on:
  push:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    name: Build for ${{ matrix.openlist_nickname }}
    runs-on: ubuntu-latest
    env:
      project_name: "luci-app-oplist"
    strategy:
      fail-fast: false
      matrix:
        include:
          - tag: "GOOS=windows GOARCH=amd64"
            openlist_nickname: "windows-amd64"
          - tag: "GOOS=darwin GOARCH=arm64"
            openlist_nickname: "darwin-arm64"
          - tag: "GOAMD64=v4"
            openlist_nickname: "linux-glibc-amd64v4"
          - tag: "GOAMD64=v3"
            openlist_nickname: "linux-glibc-amd64v3"
          - tag: "GOAMD64=v2"
            openlist_nickname: "linux-glibc-amd64v2"
          - tag: "GOAMD64=v1"
            openlist_nickname: "linux-glibc-amd64v1"
          - tag: ""
            openlist_nickname: "linux-glibc-amd64"
          - tag: "CGO_ENABLED=0"
            openlist_nickname: "linux-amd64-musl"
            openwrt: "yes"
            patch_arch: "x86_64"
            sdk_name: "openwrt-sdk-x86-64_gcc-14.3.0_musl.Linux-x86_64"
          - tag: "GOARCH=arm64"
            openlist_nickname: "linux-musl-arm64"
            openwrt: "yes"
            patch_arch: "aarch64_generic"
            sdk_name: "openwrt-sdk-rockchip-armv8_gcc-14.3.0_musl.Linux-x86_64"

    steps:
      - name: Checkout
        uses: actions/checkout@main
        with:
          path: ${{ env.project_name }}

      - name: Set up Node.js
        uses: actions/setup-node@main
        with:
          node-version: latest

      - name: Set up pnpm
        uses: pnpm/action-setup@master
        with:
          version: latest
          
      - name: Set up Go
        uses: actions/setup-go@main
        with:
          go-version: 'stable'

      - name: Build OpenList Front-End
        shell: bash
        run: |
          git clone --depth 1 https://github.com/OpenListTeam/OpenList-Frontend.git frontend-src
          cd frontend-src
          pnpm install
          pnpm build

      - name: Build OpenList Back-End
        shell: bash
        run: |
          git clone --depth 1 https://github.com/OpenListTeam/OpenList.git backend-src
          cd backend-src
          bash build.sh dev web

          builtAt="$(date +'%F %T %z')"
          goVersion=$(go version | sed 's/go version //')
          gitAuthor=$(git show -s --format='format:%aN <%ae>' HEAD)
          gitCommit=$(git log --pretty=format:"%h" -1)
          version=$(git describe --long --tags --dirty --always)

          webVersion=$(curl -s --max-time 5 "https://api.github.com/repos/OpenListTeam/OpenList-Frontend/releases/latest" -L | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/' | sed 's/^v//')
          if [ -z "$webVersion" ]; then
              webVersion="${{ steps.get_version.outputs.version }}"
          fi

          ldflags="-w -s \
            -X 'github.com/OpenListTeam/OpenList/v4/internal/conf.BuiltAt=$builtAt' \
            -X 'github.com/OpenListTeam/OpenList/v4/internal/conf.GoVersion=$goVersion' \
            -X 'github.com/OpenListTeam/OpenList/v4/internal/conf.GitAuthor=$gitAuthor' \
            -X 'github.com/OpenListTeam/OpenList/v4/internal/conf.GitCommit=$gitCommit' \
            -X 'github.com/OpenListTeam/OpenList/v4/internal/conf.Version=$version' \
            -X 'github.com/OpenListTeam/OpenList/v4/internal/conf.WebVersion=$webVersion'"
          ${{ matrix.tag }} go build -ldflags "$ldflags" -o openlist .

          chmod +x openlist
          mv ./openlist $GITHUB_WORKSPACE/openlist

      - name: Preparing build environment
        if: matrix.openwrt == 'yes'
        uses: mokanove/mokanove/actions/build-env@main

      - name: Prepare SDK
        if: matrix.openwrt == 'yes'
        uses: mokanove/mokanove/actions/prepare-sdk@main
        with:
          sdk_name: ${{ matrix.sdk_name }}

      - name: Get Version
        id: get_version
        shell: bash
        run: |
          cd ${{ env.project_name }}
          VERSION=$(grep -E "^PKG_VERSION[[:space:]]*:=" Makefile | sed -E 's/.*:=[[:space:]]*//' | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Preparation before compilation
        if: matrix.openwrt == 'yes'
        shell: bash
        run: |
          mv ${{ env.project_name }} ${{ matrix.sdk_name }}/package/
          cd ${{ matrix.sdk_name }}/package/${{ env.project_name }}/
          if [ "${{ matrix.patch_arch }}" != "x86_64" ]; then
            sed -i 's/x86_64/${{ matrix.patch_arch }}/g' ./Makefile
          fi
          cd root/usr/bin/
          rm -f DONOTREMOVE
          cp $GITHUB_WORKSPACE/openlist ./
          cd ../../etc/openlist
          rm DONOTREMOVE

      - name: Build for OpenWrt
        if: matrix.openwrt == 'yes'
        shell: bash
        run: |
          cd ${{ matrix.sdk_name }}
          make package/${{ env.project_name }}/compile V=s -j$(nproc)

      - name: Rename compilation files
        shell: bash
        run: |
          mv ${{ matrix.sdk_name }}/bin/packages/*/base/luci-app*.apk $GITHUB_WORKSPACE/luci-app-oplist-${{ steps.get_version.outputs.version }}-${{ matrix.patch_arch }}.apk || exit 0
          mv $GITHUB_WORKSPACE/openlist $GITHUB_WORKSPACE/openlist-${{ matrix.openlist_nickname }}

      - name: Release
        uses: softprops/action-gh-release@master
        with:
          tag_name: V${{ steps.get_version.outputs.version }}
          files: |
            ${{ matrix.sdk_name }}/bin/packages/*/base/*.apk
            ${{ github.workspace }}/*.apk
            ${{ github.workspace }}/openlist*
          body: |
            # 📝 Release Note
            - Fixes and improvements
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
