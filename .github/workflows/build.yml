name : I wanna say goodbye ye yeyeyeye

on:
  push:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    name: Build for ${{ matrix.patch_arch }}
    runs-on: ubuntu-latest
    env:
      project_name: "luci-app-oplist"
      openlist_version: "4.2.2"
    strategy:
      fail-fast: false
      matrix:
        include:
          - openlist_arch: "amd64"
            patch_arch: "x86_64"
            sdk_name: "openwrt-sdk-25.12.4-x86-64_gcc-14.3.0_musl.Linux-x86_64"
          - openlist_arch: "arm64"
            patch_arch: "aarch64_generic"
            sdk_name: "openwrt-sdk-25.12.4-rockchip-armv8_gcc-14.3.0_musl.Linux-x86_64"

    steps:
      - name: Checkout Code
        uses: actions/checkout@main

      - name: Install Build Dependencies
        uses: mokanove/mokanove/actions/luci-env@main

      - name: Prepare SDK
        uses: mokanove/mokanove/actions/prepare-sdk@main
        with:
          sdk_name: ${{ matrix.sdk_name }}

      - name: Clone Source Code
        uses: mokanove/mokanove/actions/clone@main
        with:
          sdk_name: ${{ matrix.sdk_name }}
          project_name: ${{ env.project_name }}

      - name: Get Version
        id: get_version
        run: |
          cd ${{ matrix.sdk_name }}/package/${{ env.project_name }}
          VERSION=$(grep -E "^PKG_VERSION[[:space:]]*:=" Makefile | sed -E 's/.*:=[[:space:]]*//' | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Change Arch
        shell: bash
        run: |
          cd ${{ matrix.sdk_name }}/package/${{ env.project_name }}
          if [ "${{ matrix.patch_arch }}" != "x86_64" ]; then
            sed -i 's/x86_64/${{ matrix.patch_arch }}/g' ./Makefile
          fi

      - name: Preparation before compilation
        shell: bash
        run: |
          cd ${{ matrix.sdk_name }}/package/${{ env.project_name }}/root/usr/bin/
          rm DONOTREMOVE
          curl -LO "https://github.com/OpenListTeam/OpenList/releases/download/v${{ env.openlist_version }}/openlist-linux-musl-${{ matrix.openlist_arch }}.tar.gz"
          tar -xzvf *.tar.gz
          rm -f *.tar.gz DONOTREMOVE
          cd ../../etc/openlist
          rm DONOTREMOVE

      - name: Build!
        uses: mokanove/mokanove/actions/build@main
        with:
          sdk_name: ${{ matrix.sdk_name }}
          project_name: ${{ env.project_name }}

      - name: Rename compilation files
        shell: bash
        run: |
          cd ${{ matrix.sdk_name }}/bin/packages/*/base/
          mv luci-app-oplist* luci-app-oplist-${{ steps.get_version.outputs.version }}-${{ matrix.patch_arch }}.apk

      - name: Release
        uses: softprops/action-gh-release@master
        with:
          tag_name: V${{ steps.get_version.outputs.version }}
          files: ${{ matrix.sdk_name }}/bin/packages/**/*.apk
          body: |
            # 📝 Release Notes
            - The issue of being unable to close HTTP3 has been fixed.
            - Stop supporting HTTP/2C
            - Introduction and translation updated.
            - The SDK has been changed to OpenWrt 25.12.4.
            - Several minor issues have been fixed.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
