name : Fuck pkg source & luci-app-openlist

on:
  push:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    name: Build for ${{ matrix.patch_arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - openlist_arch: "amd64"
            patch_arch: "x86_64"
            sdk_name: "immortalwrt-sdk-25.12.0-rc1-x86-64_gcc-14.3.0_musl.Linux-x86_64"
          - openlist_arch: "arm64"
            patch_arch: "aarch64_generic"
            sdk_name: "immortalwrt-sdk-25.12.0-rc1-rockchip-armv8_gcc-14.3.0_musl.Linux-x86_64"

    steps:
      - name: Checkout Code
        uses: actions/checkout@main

      - name: Install Build Dependencies
        uses: mokanove/mokanove/actions/luci-env@main

      - name: Prepare SDK
        uses: mokanove/mokanove/actions/prepare-sdk@main
        with:
          sdk_name: ${{ matrix.sdk_name }}

      - name: Preparation before compilation
        id: get_version
        run: |
          cd ${{ matrix.sdk_name }}/package/
          git clone https://github.com/mokanove/luci-app-oplist.git
          cd luci-app-oplist/
          VERSION=$(grep -E "^PKG_VERSION[[:space:]]*:=" Makefile | sed -E 's/.*:=[[:space:]]*//' | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          if [ "${{ matrix.patch_arch }}" != "x86_64" ]; then
            sed -i 's/x86_64/${{ matrix.patch_arch }}/g' Makefile
          fi

          cd root/usr/bin/
          rm DONOTREMOVE
          curl -LO "https://github.com/OpenListTeam/OpenList/releases/download/v4.2.0/openlist-linux-musl-${{ matrix.openlist_arch }}.tar.gz"
          tar -xzvf *.tar.gz
          rm -f *.tar.gz DONOTREMOVE
          cd ../../etc/openlist
          rm DONOTREMOVE

      - name: Build!
        run: |
          cd ${{ matrix.sdk_name }}
          make package/luci-app-oplist/compile V=s -j$(nproc)

          cd bin/packages/*/base/
          mv luci-app-oplist* luci-app-oplist-${{ steps.get_version.outputs.version }}-${{ matrix.patch_arch }}.apk

      - name: Release
        uses: softprops/action-gh-release@master
        with:
          tag_name: V${{ steps.get_version.outputs.version }}
          files: |
              ${{ matrix.sdk_name }}/bin/packages/**/*.apk
          body: |
            # 🚀 Release Notes
            ### ✨ Change Logs
            - **Style Updates**: Upgraded README.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
